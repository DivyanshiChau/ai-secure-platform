<!DOCTYPE html>
<html>
<head>
    <title>AI Secure Data Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🔐 AI Secure Data Intelligence Platform</h1>
        <p>AI Gateway + Scanner + Log Analyzer + Risk Engine</p>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="dashboard">

        <!-- LEFT PANEL -->
        <div class="card input-panel">

            <h2>📥 Input Control Center</h2>

            <textarea id="textInput" placeholder="Paste logs / SQL / chat here..."></textarea>

            <div class="or">OR</div>

            <input type="file" id="fileInput">

            <div class="btn-group">
                <button onclick="uploadFile()">🚀 Analyze</button>
                <button onclick="loadSample()">📂 Sample Log</button>
                <button onclick="clearInput()">🧹 Clear</button>
            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="card result-summary">

            <h2>📊 Threat Summary</h2>

            <div class="metrics">
                <div class="metric">
                    <span>Risk Score</span>
                    <h3 id="riskScore">-</h3>
                </div>

                <div class="metric">
                    <span>Findings</span>
                    <h3 id="findingCount">-</h3>
                </div>

                <div class="metric">
                    <span>Action</span>
                    <h3 id="action">-</h3>
                </div>
            </div>

            <div class="ai-box">
                <h3>🧠 AI Summary</h3>
                <p id="summary">No data yet...</p>
            </div>

        </div>

    </div>

    <!-- FINDINGS -->
    <div class="card">
        <h2>🔍 Findings</h2>
        <div id="findings"></div>
    </div>

    <!-- LOG VIEW -->
    <div class="card">
        <h2>🔐 Log Viewer</h2>
        <div id="logViewer"></div>
    </div>

    <!-- INSIGHTS -->
    <div class="card">
        <h2>💡 Security Insights</h2>
        <div id="insights"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
